{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16x16.png' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon/favicon.ico' %}" >

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'authentication/fonts/icomoon/style.css' %}">

    <link rel="stylesheet" href="{% static 'authentication/css/owl.carousel.min.css' %}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'authentication/css/bootstrap.min.css' %}">
    
    <!-- Style -->
    <link rel="stylesheet" href="{% static 'authentication/css/style.css' %}">

    <title>Sign In</title>
  </head>
  <body>
    <div class="content">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 contents">
            <div class="row justify-content-center">
              <div class="col-md-12">
                <div class="form-block">
                  <div class="mb-6">
                    <h3 style="text-align: center;"><strong>Sign In</strong></h3>
                  </div>
                  <form action="{% url 'authentication:signin' %}" method="post">
                    {% csrf_token %}
                    <div class="form-group last mb-4">
                      <label for="email">Email</label>
                      <input type="email" class="form-control" id="email" name='email' required>
                    </div>
                    <div class="form-group last mb-4">
                      <label for="password">Password</label>
                      <input type="password" class="form-control" id="password" name='password' required>
                    </div>
                    
                    <div class="d-flex mb-5 align-items-center">
                      {% comment %} <label class="control control--checkbox mb-0"><span class="caption">Remember me</span>
                        <input type="checkbox" checked="checked"/>
                        <div class="control__indicator"></div>
                      </label> {% endcomment %}
                      <span class="ml-auto"><a href="#" class="forgot-pass">Forgot Password?</a></span> 
                    </div>

                    <input type="submit" value="Sign In" class="btn btn-pill text-white btn-block btn-primary" style="background: #3399ff;">

                    <span class="d-block text-center my-4 text-muted"> Don't have an account? <a href='{% url 'authentication:signup' %}'>Sign Up</a></span>
                    <span class="d-block text-center my-2 text-muted"> or sign in with</span>
                    
                    <div class="social-login text-center">
                      <a href="#" class="facebook">
                        <span class="icon-facebook mr-3"></span> 
                      </a>
                      <a href="#" class="google">
                        <span class="icon-google mr-3"></span> 
                      </a>
                    </div>
                  </form>
                </div>
              </div>
            </div>
            
          </div>
          
        </div>
      </div>
    </div>

    <script src="{% static 'authentication/js/jquery-3.3.1.min.js' %}"></script>
    <script src="{% static 'authentication/js/popper.min.js' %}"></script>
    <script src="{% static 'authentication/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'authentication/js/main.js' %}"></script>
  </body>
</html>
